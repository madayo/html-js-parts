<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>🕐️Stopwatch🕐️</title>
    <style>
      html,
      body {
        font-size: 22px;
      }

      @media screen and (max-width: 480px) {

        html,
        body {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>

  <body class="bg-white text-center">
    <div id="app" class="mx-auto mt-4 max-w-full px-[10px]">
      <div class="my-2">
        <button type="button"
          class="inline-flex items-center rounded bg-red-600 px-3 py-1 text-sm font-medium text-white hover:bg-red-700"
          @click="allReset">
          {{ allResetCondition.label }}
        </button>
      </div>

      <div class="flex flex-wrap justify-center gap-1">
        <div v-for="(list, index) in lists" class="flex-[1_1_500px] max-w-[600px] p-3">
          <div class="flex flex-col rounded-md border border-gray-200 px-5 py-[0.55rem]">
            <input type="text"
              class="mb-2 mr-3 block h-8 w-full rounded border border-gray-300 px-3 text-[0.85rem] focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
              v-model="list.name">

            <div class="mt-2 flex items-center">
              <input type="text" readonly :class="[
                'flex-1 h-8 max-w-[200px] rounded px-3 text-[0.85rem] focus:outline-none',
                list.status === 'running' ? 'border border-sky-400' : 'border border-gray-300',
                list.accumulationMilliSeconds > 0 ? 'border-[3px] border-red-500' : ''
              ]" :value="formatMs(list.accumulationMilliSeconds)">

              <div class="ml-3 flex w-[220px] items-center justify-start">
                <button :disabled="list.status === 'running'" @click="startTimer(index)"
                  type="button"
                  class="mx-2 flex h-8 w-20 items-center justify-center rounded bg-sky-500 text-xs text-white hover:bg-sky-600 disabled:cursor-not-allowed disabled:opacity-50">
                  Start
                </button>
                <button @click="stopTimer(index)" :disabled="list.status === 'stopped'"
                  type="button"
                  class="mx-2 flex h-8 w-20 items-center justify-center rounded bg-sky-500 text-xs text-white hover:bg-sky-600 disabled:cursor-not-allowed disabled:opacity-50">
                  Stop
                </button>
                <button @click="resetTimer(index)" type="button"
                  class="mx-2 flex h-8 w-20 items-center justify-center rounded bg-red-600 text-xs text-white hover:bg-red-700">
                  Reset
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script>
      const initTimer = id => {
        return {
          id: id,
          name: '',
          timer: null,
          status: 'stopped',
          runningAt: null,
          accumulationMilliSeconds: 0,
        }
      }
      const createEmptyTimer = id => new Array(15).fill('').map((v, i) => { return initTimer(i) })

      const allResetDefault = {
        status: 'default',
        label: 'Reset all'
      }
      const allResetConfirm = {
        status: 'confirm',
        label: 'Are you sure?'
      }
      const saveTerm = 1000 * 10

      new Vue({
        el: '#app',
        data: {
          lastLocalStorageSavedAt: new Date().getTime(),
          allResetCondition: allResetDefault,
          lists: createEmptyTimer()
        },
        mounted() {
          if (localStorage.lists) {
            loadedLists = JSON.parse(localStorage.lists);
            this.lists = loadedLists.map((v) => {
              v.status = 'stopped'
              return v
            })
          }
        },
        methods: {
          formatMs(_ms) {
            const hour = Math.floor(_ms / 3600000)
            const minute = Math.floor((_ms - 3600000 * hour) / 60000)
            const hh = ('00' + hour).slice(-2)
            const mm = ('00' + minute).slice(-2)
            const ms = ('00000' + (_ms % 60000)).slice(-5)
            return `${hh} : ${mm} : ${ms.slice(0, 2)}.${ms.slice(2, 5)} `
          },
          startTimer(id) {
            if (this.lists[id].status === 'stopped') {
              this.lists[id].status = 'running'
              this.lists[id].runningAt = Date.now()
              this.lists[id].timer = setInterval(() => {
                this.lists[id].accumulationMilliSeconds += (Date.now() - this.lists[id].runningAt)
                this.lists[id].runningAt = Date.now()
              }, 10)
            }
          },
          stopTimer(id) {
            if (this.lists[id].status === 'running') {
              clearInterval(this.lists[id].timer)
              this.lists[id].timer = null
              this.lists[id].status = 'stopped'
              this.lists[id].runningAt = null
            }
          },
          resetTimer(id) {
            clearInterval(this.lists[id].timer)
            this.lists[id].timer = null
            this.lists[id].status = 'stopped'
            this.lists[id].runningAt = null
            this.lists[id].accumulationMilliSeconds = 0
            localStorage.lists = JSON.stringify(this.lists)
            this.lastLocalStorageSavedAt = new Date().getTime()
            this.allResetCondition = allResetDefault
          },
          allReset() {
            if (this.allResetCondition.status === allResetDefault.status) {
              this.allResetCondition = allResetConfirm
              setTimeout(() => {
                this.allResetCondition = allResetDefault
              }, 3000)
            } else {
              for (let i = 0; i < 15; i++) {
                this.stopTimer(i)
              }
              this.lists = createEmptyTimer()
              localStorage.lists = JSON.stringify(this.lists)
              this.lastLocalStorageSavedAt = new Date().getTime()
              this.allResetCondition = allResetDefault
            }
          }
        },
        watch: {
          lists: {
            handler(newValue, oldValue) {
              const current = new Date().getTime()
              if (this.lastLocalStorageSavedAt + saveTerm < current) {
                localStorage.lists = JSON.stringify(this.lists)
                this.lastLocalStorageSavedAt = current
              }
            },
            deep: true
          }
        },
      })
    </script>
  </body>

</html>
